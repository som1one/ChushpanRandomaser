services:
  db:
    image: postgres:16-alpine
    container_name: randomgodbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpass
      POSTGRES_DB: randomgodbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d randomgodbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: randomgodbot-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://botuser:botpass@db:5432/randomgodbot
      - PYTHONUNBUFFERED=1

volumes:
  pgdata:
